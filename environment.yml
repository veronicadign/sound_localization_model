name: sl_env
channels:
  - conda-forge
dependencies:
  - python=3.9
  - pip

  # --- Scientific stack ---
  - numpy=1.26
  - scipy=1.13
  - pandas
  - matplotlib
  - cython=3.1.*     # <--- here
  - h5py
  - pytables
  - gmpy2
  - numexpr
  - statsmodels
  - sympy
  - patsy
  - dill

  # --- System libs (portable) ---
  - psutil
  - joblib
  - tqdm
  - jupyter_core
  - jupyter_client
  - ipykernel
  - ipython

  # --- Audio / SNN models ---
  - nest-simulator=3.8.0
  - brian2=2.6.0

  # --- Only pip packages (pure Python) ---
  - pip:
      - brian2hears==0.9.2
      - pygame==2.6.1
      - sorcery==0.2.2
      - thorns==1
      - pysofaconventions
